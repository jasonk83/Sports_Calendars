name: Update Team Calendars (72 Hours)

on:
  schedule:
    - cron: '0 0 */3 * *' # Runs automatically every 3 days at midnight UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests ics

      - name: Run calendar scripts
        run: |
          python generate_nba.py
          python generate_nfl.py
          python generate_epl.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add celtics_schedule.ics bears_schedule.ics patriots_schedule.ics spurs_schedule.ics
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Team schedules (72h)" && git push)
